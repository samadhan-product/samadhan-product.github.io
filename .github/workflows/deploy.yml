name: Deploy portfolio

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install and build
        working-directory: frontend
        run: npm ci && npm run build
        env:
          CI: false

      - name: Bundle static site sections into build output
        run: |
          # blog: knowledge portal (canonical AI Learning under /blog/ai-learning/)
          # portfolio: detailed static portfolio page
          # assets: shared CSS and static assets
          # ai-learning, posts: legacy URL redirects only
          for path in blog portfolio assets ai-learning posts; do
            if [ -e "$path" ]; then
              cp -r "$path" frontend/build/
            fi
          done
          for file in robots.txt sitemap.xml; do
            if [ -f "$file" ]; then
              cp "$file" frontend/build/
            fi
          done

      - name: Verify SEO files in build output
        run: |
          test -f frontend/build/sitemap.xml || (echo "Missing sitemap.xml in build" && exit 1)
          test -f frontend/build/robots.txt || (echo "Missing robots.txt in build" && exit 1)
          python3 -c "import xml.etree.ElementTree as ET; ET.parse('frontend/build/sitemap.xml')"

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: frontend/build

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
